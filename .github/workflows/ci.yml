name: CI - Build & Test

# Ejecuta el pipeline en cada push o PR sobre las ramas principales.
# Garantiza que el microservicio compila y pasa los tests antes de mergear.
on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configura JDK 21 (Temurin) con caché de dependencias Maven.
      # El caché evita descargar dependencias en cada ejecución,
      # reduciendo el tiempo de build significativamente.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Compila el proyecto y ejecuta los tests.
      # -B: modo batch (sin color, apto para logs de CI)
      # clean verify: limpia artefactos previos, compila, ejecuta tests
      # y verifica que el JAR final es correcto.
      - name: Build
        run: mvn -B clean package -DskipTests