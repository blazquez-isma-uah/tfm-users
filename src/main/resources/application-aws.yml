# Perfil activo cuando SPRING_PROFILES_ACTIVE=aws (Lambda en producción)
spring:
  datasource:
    # URL completa proporcionada por SSM Parameter Store via variable de entorno Lambda
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWKS de Cognito
          jwk-set-uri: ${COGNITO_JWKS_URI}

# URL base de MS Identity en AWS: URL de API Gateway
# El valor se inyecta como variable de entorno Lambda desde CDK
identity:
  service:
    uri: ${IDENTITY_SERVICE_URI}